<!DOCTYPE html>
<html>
<head>
    <title>ClimbTrack – Create Account</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="auth-container">
        <nav class="top-nav"><a href="/login">← Back to Login</a></nav>
        <h1>ClimbTrack</h1>
        <p class="muted">Create your account to start tracking.</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="auth-error">
            {% for message in messages %}
            <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="field">
                <label>Display Name</label>
                <input type="text" name="display_name" placeholder="How you'll appear to others" required>
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="At least 8 characters" required>
            </div>

            <div class="field">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="Repeat your password" required>
            </div>

            <button type="submit">Create Account</button>

        </form>

        <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
    </div>

</body>
</html>
